name: NSE Daily Trade Report

on:
  schedule:
    # 13:30 UTC = 19:00 IST, Mon-Fri. NSE bhavcopy is usually published
    # by ~6:30-7pm IST, so this leaves a safety buffer after market close.
    - cron: "30 13 * * 1-5"
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

permissions:
  contents: write   # needed so the workflow can commit the cache/state files back

jobs:
  run-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run report script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python nse_trade_tracker.py

      - name: Persist cache and high/low log back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nse_bhavcopy_cache/ nse_high_low_log.json nse_high_low_log_*.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Update cache and high/low log [skip ci]"
          git push
